services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: md_user
      POSTGRES_PASSWORD: md_password
      POSTGRES_DB: md_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
