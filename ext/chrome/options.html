<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>HTML to Markdown Options</title>
    <link rel="stylesheet" href="vendor/tailwind.css">
  </head>
  <body class="bg-base-100 text-base-content min-h-screen flex items-center justify-center p-4">
    <div class="card w-full max-w-lg bg-base-200 shadow-xl">
      <div class="card-body">
        <h2 class="card-title text-2xl font-bold text-primary mb-4">HTML to Markdown 设置</h2>
        
        <form id="options-form" onsubmit="return false;" class="space-y-4">
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <input type="checkbox" id="heading_style" class="checkbox checkbox-primary" />
              <span class="label-text">Setext 标题风格 (使用 === 和 --- 下划线)</span>
            </label>
          </div>

          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <input type="checkbox" id="hr_style" class="checkbox checkbox-primary" />
              <span class="label-text">使用 *** 作为分隔符 (默认为 ---)</span>
            </label>
          </div>
          
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <input type="checkbox" id="code_style" class="checkbox checkbox-primary" />
              <span class="label-text">代码块使用 ``` 风格 (默认为缩进风格)</span>
            </label>
          </div>
          
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <input type="checkbox" id="link_style" class="checkbox checkbox-primary" />
              <span class="label-text">在链接中引用 URL (Reference style)</span>
            </label>
          </div>
          
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <input type="checkbox" id="strong_style" class="checkbox checkbox-primary" />
              <span class="label-text">粗体使用 __ (默认为 **)</span>
            </label>
          </div>
          
          <div class="form-control">
            <label class="label cursor-pointer justify-start gap-4">
              <input type="checkbox" id="em_style" class="checkbox checkbox-primary" />
              <span class="label-text">斜体使用 _ (默认为 *)</span>
            </label>
          </div>

          <div class="card-actions justify-end mt-6">
            <button id="save" class="btn btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
              </svg>
              保存设置
            </button>
          </div>
        </form>
      </div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
