<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>转换结果</title>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; margin: 16px; }
      .actions { margin: 8px 0; }
      button { margin-right: 8px; }
      .container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      textarea { width: 100%; height: 70vh; box-sizing: border-box; font-family: ui-monospace, Menlo, monospace; }
      .preview { height: 70vh; overflow: auto; border: 1px solid #ddd; border-radius: 8px; padding: 12px; box-sizing: border-box; background: #fafafa; }
      .preview h1, .preview h2, .preview h3, .preview h4, .preview h5, .preview h6 { margin: 0.6em 0 0.4em; }
      .preview p { margin: 0.6em 0; line-height: 1.5; }
      .preview pre { background: #f6f8fa; color: #24292e; padding: 12px; border-radius: 6px; overflow: auto; border: 1px solid #e1e4e8; }
      .preview code { background: rgba(27,31,35,0.05); padding: 0.2em 0.4em; border-radius: 3px; font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; font-size: 85%; }
      .preview pre code { background: transparent; padding: 0; border-radius: 0; color: inherit; font-size: 100%; }
      .preview blockquote { border-left: 3px solid #ddd; margin: 0.6em 0; padding-left: 10px; color: #555; }
      .preview ul, .preview ol { margin: 0.4em 0 0.4em 1.2em; }
      .preview img { max-width: 100%; border-radius: 6px; }
      .preview table { border-collapse: collapse; width: 100%; margin: 0.6em 0; }
      .preview th, .preview td { border: 1px solid #ddd; padding: 6px 8px; }
      .preview thead th { background: #f0f0f0; }
      .title { display: flex; align-items: center; justify-content: space-between; }
      .title h3 { margin: 0; }
      .subtitle { color: #666; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="title">
      <h3>转换结果</h3>
      <div class="subtitle">左侧原文，右侧预览</div>
    </div>
    <div class="actions">
      <button id="copy">复制</button>
      <button id="download">下载</button>
      <button id="refresh">刷新预览</button>
    </div>
    <div class="container">
      <textarea id="md"></textarea>
      <div id="preview" class="preview"></div>
    </div>
    <script src="vendor/markdown-it.min.js"></script>
    <script src="vendor/purify.min.js"></script>
    <script src="result.js"></script>
  </body>
  </html>
