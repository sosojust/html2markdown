<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>转换结果</title>
    <link rel="stylesheet" href="vendor/tailwind.css">
    <link rel="stylesheet" href="vendor/github-markdown.min.css">
  </head>
  <body class="bg-base-100 text-base-content h-screen flex flex-col p-4 overflow-hidden">
    <header class="navbar bg-base-200 rounded-box shadow-md mb-4 px-4 min-h-[4rem]">
      <div class="flex-1">
        <div class="flex flex-col">
          <h3 class="text-xl font-bold text-primary">转换结果</h3>
          <span class="text-xs text-base-content/70">HTML to Markdown</span>
        </div>
      </div>
      <div class="flex-none gap-2">
        <button id="copy" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-1">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 8.25V6a2.25 2.25 0 00-2.25-2.25H6A2.25 2.25 0 003.75 6v8.25A2.25 2.25 0 006 16.5h2.25m8.25-8.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-7.5A2.25 2.25 0 018.25 18v-1.5m8.25-8.25h-6a2.25 2.25 0 00-2.25 2.25v1.5m0 0h-6" />
          </svg>
          复制
        </button>
        <button id="download" class="btn btn-outline">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-1">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
          </svg>
          下载
        </button>
        <button id="refresh" class="btn btn-ghost">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-1">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
          刷新
        </button>
      </div>
    </header>

    <div class="grid grid-cols-2 gap-4 flex-1 min-h-0">
      <div class="flex flex-col h-full">
        <textarea id="md" class="textarea textarea-bordered textarea-primary h-full w-full font-mono text-sm leading-relaxed p-4 resize-none shadow-inner" placeholder="Markdown content will appear here..."></textarea>
      </div>
      <div class="flex flex-col h-full bg-base-200 rounded-box border border-base-300 shadow-inner overflow-hidden">
        <div id="preview" class="preview markdown-body h-full overflow-y-auto p-6 bg-transparent"></div>
      </div>
    </div>
    
    <script src="vendor/markdown-it.min.js"></script>
    <script src="vendor/purify.min.js"></script>
    <script src="result.js"></script>
  </body>
  </html>
